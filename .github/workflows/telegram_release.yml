name: Telegram Release Notification

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            release_body:
                description: "Changelog/Body of the fake release"
                required: true
                default: "Test Notification - Testing the bot!"
            release_url:
                description: "URL of the release to link"
                required: true
                default: "https://github.com/mubashardev/WaEnhancer/releases/latest"

jobs:
    telegram-notify:
        runs-on: ubuntu-latest
        env:
            BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
            CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        steps:
            - name: Post release to Telegram channel
              if: ${{ env.BOT_TOKEN != '' && env.CHANNEL_ID != '' }}
              run: |
                BODY="${{ github.event.release.body || inputs.release_body }}"
                URL="${{ github.event.release.html_url || inputs.release_url }}"
                MESSAGE="$BODY"$'\n\n'"Release: $URL"
                
                # Escape HTML special characters (&, <, >)
                ESCAPED_MESSAGE=$(echo "$MESSAGE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
                
                curl -f -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
                  -d "chat_id=${{ secrets.CHANNEL_ID }}" \
                  --data-urlencode "text=$ESCAPED_MESSAGE" \
                  -d "parse_mode=HTML" \
                  -d "disable_web_page_preview=true"
