name: Android CI

on:
  push:
    branches: ["master", "feature/*"]
jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'Merge') && !contains(github.event.head_commit.message, 'web')
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties
            gradle/libs.versions.toml
            **/gradle.properties



      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Remove local properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Auto-increment Version
        run: |
          # Read current values
          VERSION_CODE=$(grep 'VERSION_CODE' gradle.properties | cut -d'=' -f2)
          VERSION_NAME=$(grep 'VERSION_NAME' gradle.properties | cut -d'=' -f2)
          
          # Increment Version Code
          NEW_VERSION_CODE=$((VERSION_CODE + 1))
          
          # Increment Patch Version (the last digit)
          BASE_VERSION=$(echo $VERSION_NAME | cut -d'.' -f1,2)
          PATCH=$(echo $VERSION_NAME | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION_NAME="$BASE_VERSION.$NEW_PATCH"
          
          # Update gradle.properties
          sed -i "s/VERSION_CODE=.*/VERSION_CODE=$NEW_VERSION_CODE/" gradle.properties
          sed -i "s/VERSION_NAME=.*/VERSION_NAME=$NEW_VERSION_NAME/" gradle.properties
          
          echo "Bumping version from $VERSION_NAME ($VERSION_CODE) -> $NEW_VERSION_NAME ($NEW_VERSION_CODE)"
          echo "NEW_VERSION_NAME=$NEW_VERSION_NAME" >> $GITHUB_ENV

          # Commit and Push back to GitHub
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add gradle.properties
          git commit -m "Bump version to $NEW_VERSION_NAME ($NEW_VERSION_CODE) [skip ci]"
          git push

      - name: Build all flavor variants
        run: |
          if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
            echo "${{ secrets.KEY_STORE }}" | base64 --decode > release.jks
            ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true \
              -PandroidStoreFile=release.jks \
              -PandroidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' \
              -PandroidKeyAlias='${{ secrets.ALIAS }}' \
              -PandroidKeyPassword='${{ secrets.KEY_PASSWORD }}'
          else
            ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true
          fi

      - name: Get short SHA
        run: echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-7`" >> $GITHUB_ENV

      - name: Upload WhatsApp flavor artifacts
        uses: actions/upload-artifact@v5
        with:
          name: whatsapp-debug-app-${{ env.NEW_VERSION_NAME }}
          path: app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk

      - name: Upload Business flavor artifacts
        uses: actions/upload-artifact@v5
        with:
          name: business-debug-app-${{ env.NEW_VERSION_NAME }}
          path: app/build/outputs/apk/business/debug/app-business-debug.apk

      - name: Upload to GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: WaEnhancer ${{ env.NEW_VERSION_NAME }}
          body_path: changelog.txt
          files: |
            app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk
            app/build/outputs/apk/business/debug/app-business-debug.apk
          tag_name: ${{ env.NEW_VERSION_NAME }}

      - name: Read changelog
        id: changelog
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64 | tr -dc 'a-zA-Z0-9')
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Post release to Telegram channel
        if: ${{ env.BOT_TOKEN != '' && env.CHANNEL_ID != '' }}
        env:
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
        run: |
          FULL_MESSAGE="$CHANGELOG_BODY"$'\n\n'"Release: $RELEASE_URL"
          
          # Escape HTML special characters (&, <, >)
          ESCAPED_MESSAGE=$(printf '%s' "$FULL_MESSAGE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          
          curl -f -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.CHANNEL_ID }}" \
            --data-urlencode "text=$ESCAPED_MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
